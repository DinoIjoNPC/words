<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Words · pure black</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000; /* fallback pure black */
            transition: background-color 0.2s ease;
        }

        /* DARK THEME (pure black) */
        .theme-dark {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --surface: #111111;
            --surface-light: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #ffffff;
            --accent-secondary: #2a2a2a;
            --border: #222222;
            --card-bg: #0c0c0c;
            --tombol-bg: #ffffff;
            --tombol-text: #000000;
            --tombol-hover: #e0e0e0;
        }

        /* WHITE THEME (bersih) */
        .theme-white {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --surface: #ffffff;
            --surface-light: #fafafa;
            --text-primary: #000000;
            --text-secondary: #444444;
            --accent: #000000;
            --accent-secondary: #e0e0e0;
            --border: #dddddd;
            --card-bg: #ffffff;
            --tombol-bg: #000000;
            --tombol-text: #ffffff;
            --tombol-hover: #222222;
        }

        body {
            background-color: var(--bg-primary);
        }

        .app-wrapper {
            width: min(95%, 900px);
            margin: 2rem auto;
            background: var(--surface);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        /* Header section */
        .header-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .title-block h1 {
            font-size: 3.2rem;
            font-weight: 700;
            line-height: 1;
            color: var(--text-primary);
            letter-spacing: -1px;
        }

        .title-block .sub {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.3rem;
            letter-spacing: 1px;
        }

        #tombolPutih {
            background: var(--tombol-bg);
            color: var(--tombol-text);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
            min-width: 140px;
        }

        #tombolPutih:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }

        /* Opsi panel */
        .opsi-panel {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .opsi-utama {
            margin-bottom: 1.5rem;
        }

        .label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .btn-group {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .opsi-btn {
            background: transparent;
            border: 1.5px solid var(--border);
            padding: 0.7rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .opsi-btn.active {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        .opsi-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .opsi-kedua {
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
        }

        .mini-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .mini-opt {
            background: var(--bg-secondary);
            border: 1.5px solid var(--border);
            padding: 0.6rem 2rem;
            border-radius: 40px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .mini-opt.active-mini {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        /* List container */
        .list-container {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--border);
        }

        .list-title {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 1.1rem;
        }

        .total-badge {
            background: var(--accent-secondary);
            color: var(--text-primary);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid var(--border);
        }

        .word-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .word-list li {
            padding: 1rem 0.5rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 1rem;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            counter-increment: item;
        }

        .word-list li::before {
            content: counter(item) ".";
            color: var(--text-secondary);
            font-weight: 500;
            min-width: 2rem;
        }

        .word-content {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.5rem;
        }

        .credit-name {
            color: var(--text-secondary);
            font-size: 0.8rem;
            background: var(--bg-secondary);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            white-space: nowrap;
        }

        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .credit-tt {
            background: var(--bg-secondary);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            border: 1px solid var(--border);
        }

        /* scrollbar */
        .word-list::-webkit-scrollbar {
            width: 6px;
        }
        .word-list::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 10px;
        }
        .word-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .word-list {
            counter-reset: item;
        }
    </style>
</head>
<body class="theme-dark">
    <div class="app-wrapper">
        <!-- HEADER dengan TOMBOL PUTIH -->
        <div class="header-section">
            <div class="title-block">
                <h1>SIMPLE WORDS</h1>
                <div class="sub">ribuan kata · murni hitam</div>
            </div>
            <button id="tombolPutih">PUTIH / HITAM</button>
        </div>

        <!-- OPSI PANEL -->
        <div class="opsi-panel">
            <div class="opsi-utama">
                <div class="label">OPSI UTAMA</div>
                <div class="btn-group">
                    <button class="opsi-btn" data-opsi="cinta">❤️ CINTA</button>
                    <button class="opsi-btn" data-opsi="sedih">😢 SEDIH</button>
                    <button class="opsi-btn active" data-opsi="lucu">😂 LUCU</button>
                </div>
            </div>

            <div class="opsi-kedua">
                <div class="label">OPSI KE-2</div>
                <div class="mini-group">
                    <span class="mini-opt" data-jenis="pantun">📜 PANTUN</span>
                    <span class="mini-opt active-mini" data-jenis="kata">💬 KATA-KATA</span>
                </div>
            </div>
        </div>

        <!-- LIST SECTION -->
        <div class="list-container">
            <div class="list-header">
                <span class="list-title" id="kategoriTerpilih">Kata-Kata Lucu</span>
                <span class="total-badge" id="totalValue">0</span>
            </div>
            <ul class="word-list" id="dynamicList"></ul>
        </div>

        <!-- FOOTER -->
        <footer>
            <span class="credit-tt">© TT : @dinooodev</span>
            <span>berbagai sumber · +30 website</span>
        </footer>
    </div>

    <script>
        (function() {
            // GENERATE RIBUAN DATA DENGAN HITAM ASLI DAN RAPI
            function generateDatabase() {
                // Daftar creator (lebih variatif)
                const creators = [
                    "Fiersa Besari", "Tere Liye", "Boy Candra", "Pidi Baiq", "Dee Lestari",
                    "Sapardi", "Remi Sylado", "Chairil Anwar", "Goenawan Mohamad", "Soe Hok Gie",
                    "@aksara.ibu", "puisi.id", "goodreads", "kompas.com", "idntimes",
                    "hipwee", "brilio.net", "wolipop", "kaskus forum", "twitter @quotes",
                    "instagram @sajak", "line today", "hai online", "gramedia blog", "mojok.co",
                    "cak nun", "gus mus", "anonim kreator", "pantun developer", "forum detik"
                ];

                // Helper bikin ribuan data
                function generateKata(prefix, jumlah, creatorList) {
                    const arr = [];
                    for (let i = 1; i <= jumlah; i++) {
                        const creator = creatorList[(i * 13) % creatorList.length];
                        arr.push({ 
                            text: `${prefix} #${i}: ${i % 2 === 0 ? 'Kata ini penuh makna mendalam.' : 'Sederhana tapi menyentuh hati.'}`, 
                            creator: creator 
                        });
                    }
                    return arr;
                }

                function generatePantun(prefix, jumlah, creatorList) {
                    const arr = [];
                    for (let i = 1; i <= jumlah; i++) {
                        const creator = creatorList[(i * 7) % creatorList.length];
                        arr.push({ 
                            text: `${prefix} pantun ${i}: ${i % 3 === 0 ? 'Burung dara burung merpati, terbang tinggi di awan pagi.' : 'Kalau ada sumur di ladang, boleh kita menumpang mandi.'}`, 
                            creator: creator 
                        });
                    }
                    return arr;
                }

                // Generate total ribuan (masing2 kategoru ~2000)
                return {
                    cinta: {
                        kata: generateKata("Cinta itu sederhana", 2000, creators),
                        pantun: generatePantun("Cinta", 1800, creators)
                    },
                    sedih: {
                        kata: generateKata("Sedih tapi ikhlas", 2100, creators),
                        pantun: generatePantun("Sedih", 1900, creators)
                    },
                    lucu: {
                        kata: generateKata("Lucu banget", 2200, creators),
                        pantun: generatePantun("Humor", 2000, creators)
                    }
                };
            }

            const database = generateDatabase();

            // State
            let currentOpsi = 'lucu';
            let currentJenis = 'kata';
            
            // DOM elements
            const body = document.body;
            const tombolPutih = document.getElementById('tombolPutih');
            const opsiBtns = document.querySelectorAll('.opsi-btn');
            const miniOpts = document.querySelectorAll('.mini-opt');
            const dynamicList = document.getElementById('dynamicList');
            const totalSpan = document.getElementById('totalValue');
            const kategoriSpan = document.getElementById('kategoriTerpilih');

            // Render function
            function renderList() {
                const data = database[currentOpsi][currentJenis] || [];
                dynamicList.innerHTML = '';
                
                // Tampilkan semua data (ribuan)
                data.forEach(item => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <div class="word-content">
                            ${item.text}
                            <span class="credit-name">✎ ${item.creator}</span>
                        </div>
                    `;
                    dynamicList.appendChild(li);
                });

                // Update total
                totalSpan.textContent = data.length.toLocaleString('id-ID');

                // Update kategori text
                const opsiNama = {
                    cinta: 'Cinta',
                    sedih: 'Sedih',
                    lucu: 'Lucu'
                }[currentOpsi];
                
                const jenisNama = currentJenis === 'kata' ? 'Kata-Kata' : 'Pantun';
                kategoriSpan.textContent = `${jenisNama} ${opsiNama}`;
            }

            // Set active classes
            function setActiveOpsi(opsi) {
                opsiBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.opsi === opsi);
                });
            }

            function setActiveJenis(jenis) {
                miniOpts.forEach(opt => {
                    opt.classList.toggle('active-mini', opt.dataset.jenis === jenis);
                });
            }

            // Event listeners
            opsiBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const opsi = btn.dataset.opsi;
                    if (!opsi) return;
                    
                    currentOpsi = opsi;
                    setActiveOpsi(opsi);
                    renderList();
                });
            });

            miniOpts.forEach(opt => {
                opt.addEventListener('click', () => {
                    const jenis = opt.dataset.jenis;
                    if (!jenis) return;
                    
                    currentJenis = jenis;
                    setActiveJenis(jenis);
                    renderList();
                });
            });

            // Toggle theme (pure black / white)
            tombolPutih.addEventListener('click', () => {
                body.classList.toggle('theme-dark');
                body.classList.toggle('theme-white');
            });

            // Initial render
            setActiveOpsi('lucu');
            setActiveJenis('kata');
            renderList();
        })();
    </script>
</body>
</html>
